<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOMPurify v3.4.11 Demo</title>
    <!-- Loaded via jsDelivr CDN targeting the latest patched version -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js"></script>
</head>
<body>

    <h2>DOMPurify v3.4.11 Input/Output Demo</h2>

    <!-- 1. Input Box -->
    <label for="userInput">Type/Paste dirty HTML or payloads:</label><br>
    <input type="text" id="userInput" style="width: 100%; height: 45px;" 
           value="Hello <img src=x onerror=alert('Hacked!')> <b>World</b>">
    
    <button onclick="sanitizeAndDisplay()">Sanitize & Output</button>

    <hr>

    <!-- 2. Safe Output Container -->
    <h3>Clean Output:</h3>
    <div id="output" style="padding: 10px; border: 1px solid #ccc; min-height: 30px; background: #fafafa;"></div>

    <script>
        function sanitizeAndDisplay() {
            // Grab the raw text from the input tag
            const dirtyInput = document.getElementById('userInput').value;

            // Use the updated engine to strip out exploit mechanics
            const cleanOutput = DOMPurify.sanitize(dirtyInput);

            // Safely push to the DOM
            document.getElementById('output').innerHTML = cleanOutput;
        }

        // Initialize display automatically
        sanitizeAndDisplay();
    </script>

</body>
</html>
